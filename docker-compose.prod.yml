services:
  # ─── Shared Infrastructure ───
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hermes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: hermes
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hermes}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backends ───
  exodus:
    build:
      context: ../exodus/backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hermes}:${POSTGRES_PASSWORD}@postgres:5432/exodus
      CORS_ORIGIN: ${EXODUS_CORS_ORIGIN:-*}
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy

  muse:
    build:
      context: ../muse
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hermes}:${POSTGRES_PASSWORD}@postgres:5432/muse
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      PORT: 3001
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp-credentials.json
      GOOGLE_PROJECT_ID: ${GOOGLE_PROJECT_ID}
      GOOGLE_LOCATION: ${GOOGLE_LOCATION:-global}
      DIGEST_CRON: ${DIGEST_CRON:-0 7 * * *}
    volumes:
      - ./gcp-credentials.json:/run/secrets/gcp-credentials.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  progression:
    build:
      context: ../progression/progression-be
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hermes}:${POSTGRES_PASSWORD}@postgres:5432/progression
      FIREBASE_CREDENTIALS_JSON: ${FIREBASE_CREDENTIALS_JSON}
      CORS_ORIGINS: ${PROGRESSION_CORS_ORIGINS:-*}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      PORT: 8000
      AGENT_API_KEY: ${PROGRESSION_AGENT_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  sisyphus:
    build:
      context: ../sisyphus/backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hermes}:${POSTGRES_PASSWORD}@postgres:5432/sisyphus
      FIREBASE_CREDENTIALS_JSON: ${FIREBASE_CREDENTIALS_JSON}
      PORT: 3003
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Honcho (Agent Memory) ───
  honcho-api:
    build:
      context: ../honcho
    entrypoint: ["sh", "-c", "python scripts/provision_db.py && exec fastapi run --host 0.0.0.0 src/main.py"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8000"
    environment:
      DB_CONNECTION_URI: postgresql+psycopg://${POSTGRES_USER:-hermes}:${POSTGRES_PASSWORD}@postgres:5432/honcho
      CACHE_ENABLED: "true"
      CACHE_URL: redis://redis:6379/1?suppress=true
      AUTH_USE_AUTH: "false"
      LLM_EMBEDDING_PROVIDER: gemini
      GOOGLE_GENAI_USE_VERTEXAI: "true"
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_PROJECT_ID}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_LOCATION:-us-central1}
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp-credentials.json
      DERIVER_PROVIDER: google
      SUMMARY_PROVIDER: google
      DREAM_PROVIDER: google
      DREAM_MODEL: gemini-2.5-flash
      DIALECTIC__LEVELS__MINIMAL__PROVIDER: google
      DIALECTIC__LEVELS__MINIMAL__MODEL: gemini-2.5-flash-lite
      DIALECTIC__LEVELS__MINIMAL__THINKING_BUDGET_TOKENS: "0"
      DIALECTIC__LEVELS__MINIMAL__MAX_TOOL_ITERATIONS: "1"
      DIALECTIC__LEVELS__MINIMAL__MAX_OUTPUT_TOKENS: "250"
      DIALECTIC__LEVELS__MINIMAL__TOOL_CHOICE: any
      DIALECTIC__LEVELS__LOW__PROVIDER: google
      DIALECTIC__LEVELS__LOW__MODEL: gemini-2.5-flash-lite
      DIALECTIC__LEVELS__LOW__THINKING_BUDGET_TOKENS: "0"
      DIALECTIC__LEVELS__LOW__MAX_TOOL_ITERATIONS: "5"
      DIALECTIC__LEVELS__LOW__TOOL_CHOICE: any
      DIALECTIC__LEVELS__MEDIUM__PROVIDER: google
      DIALECTIC__LEVELS__MEDIUM__MODEL: gemini-2.5-flash
      DIALECTIC__LEVELS__MEDIUM__THINKING_BUDGET_TOKENS: "1024"
      DIALECTIC__LEVELS__MEDIUM__MAX_TOOL_ITERATIONS: "2"
      DIALECTIC__LEVELS__HIGH__PROVIDER: google
      DIALECTIC__LEVELS__HIGH__MODEL: gemini-2.5-flash
      DIALECTIC__LEVELS__HIGH__THINKING_BUDGET_TOKENS: "1024"
      DIALECTIC__LEVELS__HIGH__MAX_TOOL_ITERATIONS: "4"
      DIALECTIC__LEVELS__MAX__PROVIDER: google
      DIALECTIC__LEVELS__MAX__MODEL: gemini-2.5-pro
      DIALECTIC__LEVELS__MAX__THINKING_BUDGET_TOKENS: "2048"
      DIALECTIC__LEVELS__MAX__MAX_TOOL_ITERATIONS: "10"
      VECTOR_STORE_TYPE: pgvector
      LOG_LEVEL: INFO
    volumes:
      - ./gcp-credentials.json:/run/secrets/gcp-credentials.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  honcho-deriver:
    build:
      context: ../honcho
    entrypoint: ["/app/.venv/bin/python", "-m", "src.deriver"]
    restart: unless-stopped
    environment:
      DB_CONNECTION_URI: postgresql+psycopg://${POSTGRES_USER:-hermes}:${POSTGRES_PASSWORD}@postgres:5432/honcho
      CACHE_ENABLED: "true"
      CACHE_URL: redis://redis:6379/1?suppress=true
      LLM_EMBEDDING_PROVIDER: gemini
      GOOGLE_GENAI_USE_VERTEXAI: "true"
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_PROJECT_ID}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_LOCATION:-us-central1}
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp-credentials.json
      DERIVER_PROVIDER: google
      SUMMARY_PROVIDER: google
      DREAM_PROVIDER: google
      DREAM_MODEL: gemini-2.5-flash
      DIALECTIC__LEVELS__MINIMAL__PROVIDER: google
      DIALECTIC__LEVELS__MINIMAL__MODEL: gemini-2.5-flash-lite
      DIALECTIC__LEVELS__MINIMAL__THINKING_BUDGET_TOKENS: "0"
      DIALECTIC__LEVELS__MINIMAL__MAX_TOOL_ITERATIONS: "1"
      DIALECTIC__LEVELS__MINIMAL__MAX_OUTPUT_TOKENS: "250"
      DIALECTIC__LEVELS__MINIMAL__TOOL_CHOICE: any
      DIALECTIC__LEVELS__LOW__PROVIDER: google
      DIALECTIC__LEVELS__LOW__MODEL: gemini-2.5-flash-lite
      DIALECTIC__LEVELS__LOW__THINKING_BUDGET_TOKENS: "0"
      DIALECTIC__LEVELS__LOW__MAX_TOOL_ITERATIONS: "5"
      DIALECTIC__LEVELS__LOW__TOOL_CHOICE: any
      DIALECTIC__LEVELS__MEDIUM__PROVIDER: google
      DIALECTIC__LEVELS__MEDIUM__MODEL: gemini-2.5-flash
      DIALECTIC__LEVELS__MEDIUM__THINKING_BUDGET_TOKENS: "1024"
      DIALECTIC__LEVELS__MEDIUM__MAX_TOOL_ITERATIONS: "2"
      DIALECTIC__LEVELS__HIGH__PROVIDER: google
      DIALECTIC__LEVELS__HIGH__MODEL: gemini-2.5-flash
      DIALECTIC__LEVELS__HIGH__THINKING_BUDGET_TOKENS: "1024"
      DIALECTIC__LEVELS__HIGH__MAX_TOOL_ITERATIONS: "4"
      DIALECTIC__LEVELS__MAX__PROVIDER: google
      DIALECTIC__LEVELS__MAX__MODEL: gemini-2.5-pro
      DIALECTIC__LEVELS__MAX__THINKING_BUDGET_TOKENS: "2048"
      DIALECTIC__LEVELS__MAX__MAX_TOOL_ITERATIONS: "10"
      VECTOR_STORE_TYPE: pgvector
      DERIVER_ENABLED: "true"
      DERIVER_WORKERS: "1"
      LOG_LEVEL: INFO
    volumes:
      - ./gcp-credentials.json:/run/secrets/gcp-credentials.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Reverse Proxy ───
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - exodus
      - muse
      - progression
      - sisyphus

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot

volumes:
  postgres_data:
  redis_data:
  certbot_conf:
  certbot_www:
