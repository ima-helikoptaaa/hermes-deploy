events {
    worker_connections 256;
}

http {
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # Shared proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_pass_header Authorization;

    # ─── HTTP (redirect to HTTPS once SSL is set up) ───
    server {
        listen 80;
        server_name _;

        # Certbot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # For initial setup without SSL, proxy directly
        # Once SSL is ready, uncomment the return 301 and comment out the locations below
        # return 301 https://$host$request_uri;

        location /api/exodus/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://exodus:3000/api/;
        }

        location /api/muse/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://muse:3001/;
        }

        location /api/progression/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://progression:8000/;
        }

        location /api/sisyphus/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://sisyphus:3003/;
        }

        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }

    # ─── HTTPS (uncomment after running certbot) ───
    # server {
    #     listen 443 ssl;
    #     server_name YOUR_DOMAIN;
    #
    #     ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    #
    #     location /api/exodus/ {
    #         limit_req zone=api burst=20 nodelay;
    #         proxy_pass http://exodus:3000/;
    #     }
    #
    #     location /api/muse/ {
    #         limit_req zone=api burst=20 nodelay;
    #         proxy_pass http://muse:3001/;
    #     }
